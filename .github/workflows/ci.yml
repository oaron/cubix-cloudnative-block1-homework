name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
    - name: Build with Maven
      run: ./mvnw package
    - name: Upload artifact for Docker job
      uses: actions/upload-artifact@v4
      with:
        name: java-app
        path: '${{ github.workspace }}/target/*.jar'

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Download artifact from maven job
      uses: actions/download-artifact@v4
      with:
        name: java-app
    - name: Build and push Docker image
      run: |
        docker login ghcr.io -u oaron -p ${{ github.token }}
        docker build . -t ghcr.io/oaron/cubix/1/homework/app:springboot
        docker push ghcr.io/oaron/cubix/1/homework/app:springboot

  verify:
    runs-on: ubuntu-latest
    needs: docker
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Verify Docker image
      run: bash verify-image.sh
